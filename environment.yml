name: miceagent
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.12,<3.13
  - pip
  - pip:
      # Runtime
      - fastapi>=0.115.0
      - "uvicorn[standard]>=0.30.0"
      - websockets>=13.0
      - pydantic>=2.10.0
      - httpx>=0.27.0
      # Dev / Test
      - pytest>=8.0
      - pytest-asyncio>=0.24
      # Tooling (needed for `uv run server.py`)
      - uv

